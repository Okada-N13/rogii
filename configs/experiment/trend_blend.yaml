experiment_name: trend_blend
seed: 42

data:
  data_dir: null
  split: train
  limit_wells: null

cv:
  n_splits: 5
  seed: 42

model:
  name: fixed_blend
  components:
    - weight: 0.95
      model:
        name: last_tvt_anchor
    - weight: 0.04
      model:
        name: guarded_trend
        target: surface
        degree: 1
        window_ft: 500
        minimum_points: 20
        ridge: 0.001
        huber_delta: 1.5
        robust_iterations: 5
        slope_clip: 1.2
        max_delta_ft: 250
        strength: 1.0
    - weight: 0.01
      model:
        name: guarded_trend
        target: surface
        degree: 2
        window_ft: 1000
        minimum_points: 30
        ridge: 0.01
        huber_delta: 1.5
        robust_iterations: 5
        slope_clip: 1.2
        curvature_clip: 0.0001
        max_delta_ft: 250
        strength: 0.5

output:
  artifact_dir: null
