experiment_name: stage9_residual_tcn
seed: 42

model:
  channels: 32
  blocks: 4
  kernel_size: 5
  dropout: 0.15
  output_cap: 40.0
  training_stride: 4
  batch_size: 8
  epochs: 8
  patience: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip: 1.0

selection:
  weights: [0.05, 0.10, 0.20, 0.35, 0.50, 0.75, 1.0]
  minimum_selection_gain: 0.02
  inner_fold_tolerance: 0.0

validation:
  minimum_standard_gain: 0.05
  minimum_improved_fold_fraction: 0.8
  bootstrap_resamples: 2000
