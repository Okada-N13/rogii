experiment_name: stage12b_learned_emission_tcn
seed: 42

ncc:
  offset_min_ft: -60.0
  offset_max_ft: 60.0
  offset_step_ft: 2.0
  alignment_stride: 4
  max_rows_per_cut: 256
  windows: [5, 13, 25]
  mix_windows: [13, 25]
  mix_weights: [0.40, 0.60]
  slope_correction_cap: 80.0
  curvature_cap: 30.0

model:
  channels: 32
  blocks: 4
  kernel_size: 5
  dropout: 0.10
  batch_size: 2
  epochs: 8
  patience: 2
  learning_rate: 0.0008
  weight_decay: 0.0001
  gradient_clip: 1.0
  label_smoothing: 0.02
  hard_negative_weight: 0.20
  hard_negative_margin: 0.50

validation:
  required_surface_spec: w075_cap50
  raw_temperature: 0.25
  minimum_top10_gain: 0.02
  minimum_improved_folds: 4
